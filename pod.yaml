apiVersion: v1
kind: Pod
metadata: 
  name: example-pod
  labels:
    app: example-app
spec: 
    containers: 
      - name: example-container
        image: nginx:latest
        ports:  
          - containerPort: 80
            name: http 
            protocol: TCP
        resources:
          requests:  
            memory: "64Mi"
            cpu: "125m"
