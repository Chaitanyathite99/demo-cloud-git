apiVersion: v1
kind: Pod
metadata: 
  name: chaitanya-pod
  labels:
    app: chaitanya-app
spec: 
    containers: 
      - name: chaitanya-container
        image: nginx:latest
        ports:  
          - containerPort: 80
            name: http 
            protocol: TCP
        resources:
          requests:  
            memory: "64Mi"
            cpu: "125m"
