apiVersion: v1
kind: Pod 
metadata:
  name: chaitanya
  namespace: chaitanya
  labels:
    app: myapp
spec:
    containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort : 80
              protocol : TCP
              name: nginx
---
apiVersion: v1
kind: Service
metadata:
    name: b24service
    namespace: chaitanya
spec:
    type: NodePort
    selector:
      app: myapp
    ports:
        - port: 80
          targetPort: 80
          protocol: TCP
---
apiVersion: v1
kind: ReplicationController
metadata:
  name: chaitanya
  namespace: chaitanya
  labels:
    app: myapp
spec: 
    selector: 
      app: rpcapp 
    replicas: 4
    template:   
      metadata:
        labels:
          name: nginxapp
          app: rpcapp
      spec:
        containers:
          - name: nginxapp
            image: nginx:latest 
            ports:
                - containerPort: 80
                  protocol: TCP

---
apiVersion: v1
kind:  Namespace
metadata:
    name: chaitanya
    labels:
      app: b24ns
